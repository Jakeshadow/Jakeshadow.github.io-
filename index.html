<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Personal homepage — Marketing & Growth professional">
  <title>Your Name — Marketing & Growth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header id="site-header"></header>

  <main>
    <section id="hero">
      <div class="hero-avatar">
        <img src="assets/avatar.jpg" alt="Avatar" width="96" height="96">
      </div>
      <h1 class="hero-name">Your Name</h1>
      <p class="hero-title">
        <span lang="zh">增长营销经理 · 上海</span>
        <span lang="en">Growth Marketing Manager · Shanghai</span>
      </p>
      <p class="hero-tagline">
        <span lang="zh">用数据和内容驱动增长，6年运营实战经验</span>
        <span lang="en">Driving growth through data and content — 6 years in marketing operations</span>
      </p>
      <div class="hero-lang-toggle">
        <button id="lang-zh" class="lang-btn active">中文</button>
        <span class="lang-divider">/</span>
        <button id="lang-en" class="lang-btn">EN</button>
      </div>
    </section>
    <section id="timeline"></section>
    <section id="projects"></section>
    <section id="skills"></section>
    <section id="insights"></section>
  </main>

  <footer id="site-footer"></footer>

  <script src="js/i18n.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
